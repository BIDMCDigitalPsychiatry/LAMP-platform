name: Regenerate lockfile

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # This refreshes ONLY package-lock.json according to your package.json + overrides
      - name: Create/refresh package-lock.json
        run: npm install --package-lock-only

      # Commit the lockfile IF it changed (this has the correct 'fi')
      - name: Commit lockfile if changed
        run: |
          if git diff --quiet --exit-code -- package-lock.json; then
            echo "No changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: refresh package-lock.json (sync @docusaurus to 3.7.0)"
            git push
          fi