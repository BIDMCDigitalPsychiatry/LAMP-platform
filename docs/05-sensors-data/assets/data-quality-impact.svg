<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="goodZone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="warnZone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="badZone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">How data quality affects GPS-derived features</text>
  <text x="340" y="42" text-anchor="middle" font-size="11" fill="#64748b">Error in home time estimates as GPS sampling becomes sparser</text>

  <!-- Chart area -->
  <g transform="translate(80, 60)">
    <!-- Background zones -->
    <rect x="0" y="0" width="200" height="220" fill="url(#goodZone)"/>
    <rect x="200" y="0" width="130" height="220" fill="url(#warnZone)"/>
    <rect x="330" y="0" width="220" height="220" fill="url(#badZone)"/>

    <!-- Zone labels at top -->
    <text x="100" y="-8" text-anchor="middle" font-size="10" font-weight="500" fill="#059669">Reliable</text>
    <text x="265" y="-8" text-anchor="middle" font-size="10" font-weight="500" fill="#d97706">Variable</text>
    <text x="440" y="-8" text-anchor="middle" font-size="10" font-weight="500" fill="#dc2626">Unreliable</text>

    <!-- Y axis -->
    <line x1="0" y1="0" x2="0" y2="220" stroke="#cbd5e1" stroke-width="1"/>
    <!-- Y axis labels -->
    <text x="-8" y="220" text-anchor="end" font-size="10" fill="#64748b">0</text>
    <text x="-8" y="176" text-anchor="end" font-size="10" fill="#64748b">1</text>
    <text x="-8" y="132" text-anchor="end" font-size="10" fill="#64748b">2</text>
    <text x="-8" y="88" text-anchor="end" font-size="10" fill="#64748b">3</text>
    <text x="-8" y="44" text-anchor="end" font-size="10" fill="#64748b">4</text>
    <text x="-8" y="4" text-anchor="end" font-size="10" fill="#64748b">5</text>
    <!-- Y axis title -->
    <text x="-55" y="110" text-anchor="middle" font-size="11" fill="#475569" transform="rotate(-90, -55, 110)">Home time error (hours)</text>

    <!-- Grid lines -->
    <line x1="0" y1="176" x2="550" y2="176" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="0" y1="132" x2="550" y2="132" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="0" y1="88" x2="550" y2="88" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="0" y1="44" x2="550" y2="44" stroke="#e2e8f0" stroke-width="0.5"/>

    <!-- X axis -->
    <line x1="0" y1="220" x2="550" y2="220" stroke="#cbd5e1" stroke-width="1"/>

    <!-- X axis labels (sampling intervals) -->
    <text x="0" y="238" text-anchor="middle" font-size="9" fill="#64748b">5s</text>
    <text x="55" y="238" text-anchor="middle" font-size="9" fill="#64748b">10s</text>
    <text x="110" y="238" text-anchor="middle" font-size="9" fill="#64748b">30s</text>
    <text x="165" y="238" text-anchor="middle" font-size="9" fill="#64748b">1m</text>
    <text x="220" y="238" text-anchor="middle" font-size="9" fill="#64748b">5m</text>
    <text x="275" y="238" text-anchor="middle" font-size="9" fill="#64748b">10m</text>
    <text x="330" y="238" text-anchor="middle" font-size="9" fill="#64748b">15m</text>
    <text x="385" y="238" text-anchor="middle" font-size="9" fill="#64748b">30m</text>
    <text x="440" y="238" text-anchor="middle" font-size="9" fill="#64748b">45m</text>
    <text x="495" y="238" text-anchor="middle" font-size="9" fill="#64748b">60m</text>

    <!-- X axis title -->
    <text x="275" y="258" text-anchor="middle" font-size="11" fill="#475569">GPS sampling interval (time between readings)</text>

    <!-- Data: box-and-whisker approximations based on paper Fig 9 -->
    <!-- 5s: near zero -->
    <rect x="-6" y="214" width="12" height="6" rx="1" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
    <line x1="-6" y1="217" x2="6" y2="217" stroke="#3b82f6" stroke-width="2"/>

    <!-- 10s: near zero -->
    <rect x="49" y="212" width="12" height="8" rx="1" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
    <line x1="49" y1="216" x2="61" y2="216" stroke="#3b82f6" stroke-width="2"/>

    <!-- 30s: very small -->
    <rect x="104" y="208" width="12" height="12" rx="1" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
    <line x1="104" y1="213" x2="116" y2="213" stroke="#3b82f6" stroke-width="2"/>

    <!-- 1m: small -->
    <rect x="159" y="202" width="12" height="16" rx="1" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
    <line x1="159" y1="209" x2="171" y2="209" stroke="#3b82f6" stroke-width="2"/>

    <!-- 5m: moderate -->
    <rect x="214" y="185" width="12" height="30" rx="1" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="1"/>
    <line x1="214" y1="198" x2="226" y2="198" stroke="#f59e0b" stroke-width="2"/>

    <!-- 10m: growing -->
    <rect x="269" y="165" width="12" height="45" rx="1" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="1"/>
    <line x1="269" y1="185" x2="281" y2="185" stroke="#f59e0b" stroke-width="2"/>

    <!-- 15m: significant -->
    <rect x="324" y="140" width="12" height="60" rx="1" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1"/>
    <line x1="324" y1="168" x2="336" y2="168" stroke="#ef4444" stroke-width="2"/>

    <!-- 30m: large (2-4 hrs) -->
    <rect x="379" y="80" width="12" height="100" rx="1" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1"/>
    <line x1="379" y1="125" x2="391" y2="125" stroke="#ef4444" stroke-width="2"/>
    <!-- whiskers -->
    <line x1="385" y1="50" x2="385" y2="80" stroke="#ef4444" stroke-width="1"/>
    <line x1="381" y1="50" x2="389" y2="50" stroke="#ef4444" stroke-width="1"/>

    <!-- 45m: very large -->
    <rect x="434" y="55" width="12" height="120" rx="1" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1"/>
    <line x1="434" y1="105" x2="446" y2="105" stroke="#ef4444" stroke-width="2"/>
    <!-- whiskers -->
    <line x1="440" y1="25" x2="440" y2="55" stroke="#ef4444" stroke-width="1"/>
    <line x1="436" y1="25" x2="444" y2="25" stroke="#ef4444" stroke-width="1"/>

    <!-- 60m: extreme -->
    <rect x="489" y="30" width="12" height="140" rx="1" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1"/>
    <line x1="489" y1="88" x2="501" y2="88" stroke="#ef4444" stroke-width="2"/>
    <!-- whiskers -->
    <line x1="495" y1="10" x2="495" y2="30" stroke="#ef4444" stroke-width="1"/>
    <line x1="491" y1="10" x2="499" y2="10" stroke="#ef4444" stroke-width="1"/>

    <!-- 50% threshold line -->
    <line x1="330" y1="0" x2="330" y2="220" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
    <text x="330" y="270" text-anchor="middle" font-size="9" font-weight="500" fill="#64748b">~50% data quality threshold</text>
  </g>

  <!-- Annotation removed — citation is in the markdown caption -->
</svg>