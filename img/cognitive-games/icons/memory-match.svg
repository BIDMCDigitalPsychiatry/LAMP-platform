<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- 2x2 card grid — two flipped (matching), two face-down -->
<rect x="14" y="20" width="32" height="36" rx="5" fill="#C75E5A"/>
<text x="30" y="43" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">★</text>
<rect x="54" y="20" width="32" height="36" rx="5" fill="#FAC1B5"/>
<text x="70" y="43" font-family="sans-serif" font-size="18" fill="#C75E5A" text-anchor="middle">?</text>
<rect x="14" y="62" width="32" height="36" rx="5" fill="#FAC1B5"/>
<text x="30" y="85" font-family="sans-serif" font-size="18" fill="#C75E5A" text-anchor="middle">?</text>
<rect x="54" y="62" width="32" height="36" rx="5" fill="#C75E5A"/>
<text x="70" y="85" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">★</text>
</svg>
